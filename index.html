<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPANTAU CIPTAKARYA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .hidden-section { display: none !important; }
        .active-tab { border-bottom: 4px solid #facc15; color: #facc15; font-weight: bold; }
        /* Animasi sederhana agar perpindahan halus */
        section { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-100 font-sans pb-24">

    <header class="bg-blue-900 text-white p-4 shadow-lg sticky top-0 z-[100]">
        <div class="container mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-white p-1 rounded-full h-10 w-10 flex items-center justify-center">
                    <i class="fas fa-city text-blue-900 text-xl"></i>
                </div>
                <div>
                    <h1 class="text-sm font-black leading-none uppercase tracking-tighter">SIPANTAU CIPTAKARYA</h1>
                    <p class="text-[8px] text-yellow-400 font-bold uppercase tracking-widest">DPRKPCK JAWA TIMUR</p>
                </div>
            </div>
            
            <div class="relative">
                <button onclick="toggleMenu(event)" class="p-2 hover:bg-blue-800 rounded-full">
                    <i class="fas fa-ellipsis-v text-xl"></i>
                </button>
                <div id="menu-dropdown" class="hidden-section absolute right-0 mt-3 w-56 bg-white text-gray-800 rounded-2xl shadow-2xl border z-[110] overflow-hidden">
                    <button onclick="nav('sni')" class="w-full text-left px-5 py-4 hover:bg-blue-50 border-b flex items-center gap-3">
                        <i class="fas fa-file-contract text-blue-700"></i> Pantau SNI
                    </button>
                    <button onclick="nav('lapangan')" class="w-full text-left px-5 py-4 hover:bg-blue-50 border-b flex items-center gap-3">
                        <i class="fas fa-hard-hat text-orange-600"></i> Pantau Lapangan
                    </button>
                    <button onclick="nav('monitor')" class="w-full text-left px-5 py-4 hover:bg-yellow-50 flex items-center gap-3 font-bold">
                        <i class="fas fa-desktop text-green-600"></i> Monitoring
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto mt-6 px-4">
        <div class="text-center mb-6">
            <h2 id="display-title" class="text-lg font-black text-blue-900 uppercase">PANTAU SNI</h2>
            <div class="h-1.5 w-12 bg-yellow-400 mx-auto mt-1 rounded-full"></div>
        </div>

        <section id="sec-sni">
            <div class="flex border-b mb-6 gap-6 justify-center">
                <button onclick="tabSni('gudang')" id="btn-gudang" class="pb-2 text-[10px] uppercase font-bold active-tab">📂 Gudang</button>
                <button onclick="tabSni('cek')" id="btn-cek" class="pb-2 text-[10px] uppercase font-bold text-gray-400">🔍 Cek Mandiri</button>
            </div>

            <div id="sub-gudang" class="grid gap-3">
                <a href="SNI 2847-2019 Persyaratan Beton Struktural Untuk Bangunan Gedung.pdf" target="_blank" class="p-4 bg-white rounded-2xl shadow-sm border-l-4 border-blue-600 flex justify-between items-center">
                    <span class="text-xs font-bold">SNI 2847-2019 (Beton)</span>
                    <i class="fas fa-file-pdf text-red-500"></i>
                </a>
                <a href="1727 - SNI 1727-2020 Beban desain minimum dan kriteria terkait untuk bangunan gedung dan struktur lain.pdf" target="_blank" class="p-4 bg-white rounded-2xl shadow-sm border-l-4 border-blue-600 flex justify-between items-center">
                    <span class="text-xs font-bold">SNI 1727-2020 (Beban)</span>
                    <i class="fas fa-file-pdf text-red-500"></i>
                </a>
                <p class="text-center text-[10px] text-gray-400 mt-2 italic">Daftar SNI lainnya tersedia di folder lokal.</p>
            </div>

            <div id="sub-cek" class="hidden-section bg-white p-6 rounded-3xl shadow-sm border text-center">
                <h3 class="font-bold text-sm mb-4">Verifikasi Standar Proyek</h3>
                <input type="file" id="file-mandiri" class="w-full p-3 border-2 border-dashed rounded-xl mb-4 text-xs bg-gray-50">
                <button onclick="aksiCek()" class="w-full bg-blue-900 text-white py-3 rounded-xl font-bold text-xs uppercase">Proses Analisis</button>
                <div id="hasil-mandiri" class="hidden mt-4 text-left p-4 bg-blue-50 rounded-xl text-[10px] border border-blue-100"></div>
            </div>
        </section>

        <section id="sec-lapangan" class="hidden-section">
            <div class="bg-white p-6 rounded-3xl shadow-lg border">
                <input type="text" id="lap-judul" placeholder="Nama Pekerjaan" class="w-full p-4 bg-gray-50 rounded-xl mb-3 border text-sm outline-none">
                <textarea id="lap-ket" placeholder="Keterangan lapangan..." class="w-full p-4 bg-gray-50 rounded-xl mb-3 border text-sm min-h-[100px]"></textarea>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="bg-blue-50 p-3 rounded-xl">
                        <label class="text-[9px] font-bold text-blue-800 uppercase">Progres (%)</label>
                        <input type="number" id="lap-persen" class="w-full bg-transparent font-bold text-lg outline-none" value="0">
                    </div>
                    <div class="bg-gray-50 p-3 rounded-xl">
                        <label class="text-[9px] font-bold text-gray-500 uppercase">File Lampiran</label>
                        <input type="file" id="lap-file" class="text-[8px] w-full mt-1">
                    </div>
                </div>
                <button onclick="kirimLaporan()" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-bold uppercase text-xs shadow-lg">Upload Laporan</button>
            </div>
        </section>

        <section id="sec-monitor" class="hidden-section">
            <div id="list-monitor" class="space-y-4 text-center">
                </div>
        </section>
    </main>

    <footer class="fixed bottom-0 w-full bg-white/80 backdrop-blur-md border-t p-3 text-center">
        <p class="text-[9px] font-black text-gray-400 tracking-[0.3em] uppercase">Tegar Imam Prasojo • 2026</p>
    </footer>

    <script>
        // 1. FUNGSI NAVIGASI (Fix Masalah Layar Kosong)
        function nav(target) {
            // Sembunyikan semua section
            document.getElementById('sec-sni').classList.add('hidden-section');
            document.getElementById('sec-lapangan').classList.add('hidden-section');
            document.getElementById('sec-monitor').classList.add('hidden-section');
            
            // Tampilkan yang diklik
            document.getElementById('sec-' + target).classList.remove('hidden-section');
            
            // Ganti Judul
            const label = { 'sni': 'PANTAU SNI', 'lapangan': 'PANTAU LAPANGAN', 'monitor': 'MONITORING REALTIME' };
            document.getElementById('display-title').innerText = label[target];

            // Tutup Menu
            document.getElementById('menu-dropdown').classList.add('hidden-section');

            if(target === 'monitor') renderData();
        }

        // 2. TAB SNI (Gudang vs Cek)
        function tabSni(fitur) {
            document.getElementById('sub-gudang').classList.add('hidden-section');
            document.getElementById('sub-cek').classList.add('hidden-section');
            document.getElementById('btn-gudang').className = "pb-2 text-[10px] uppercase font-bold text-gray-400";
            document.getElementById('btn-cek').className = "pb-2 text-[10px] uppercase font-bold text-gray-400";

            document.getElementById('sub-' + fitur).classList.remove('hidden-section');
            document.getElementById('btn-' + fitur).className = "pb-2 text-[10px] uppercase font-bold active-tab";
        }

        // 3. DROPDOWN TOGGLE
        function toggleMenu(e) {
            e.stopPropagation();
            document.getElementById('menu-dropdown').classList.toggle('hidden-section');
        }
        window.onclick = () => document.getElementById('menu-dropdown').classList.add('hidden-section');

        // 4. CEK MANDIRI LOGIC
        function aksiCek() {
            const f = document.getElementById('file-mandiri').files[0];
            if(!f) return alert("Pilih file!");
            const h = document.getElementById('hasil-mandiri');
            h.classList.remove('hidden');
            h.innerHTML = `<strong>ANALISIS:</strong> <br> File: ${f.name} <br> Kesesuaian SNI: <span class="text-green-600 font-bold">95% (VALID)</span> <br> <i class="text-gray-400">*Hasil simulasi sistem.</i>`;
        }

        // 5. MONITORING LOGIC
        function kirimLaporan() {
            let data = JSON.parse(localStorage.getItem('db_sipan')) || [];
            let file = document.getElementById('lap-file').files[0];
            
            data.push({
                id: Date.now(),
                tgl: new Date().toLocaleDateString('id-ID'),
                judul: document.getElementById('lap-judul').value || "Pekerjaan",
                ket: document.getElementById('lap-ket').value,
                persen: document.getElementById('lap-persen').value,
                file: file ? file.name : "n/a"
            });

            localStorage.setItem('db_sipan', JSON.stringify(data));
            alert("Laporan Berhasil Terkirim!");
            nav('monitor');
        }

        function renderData() {
            const list = document.getElementById('list-monitor');
            const data = JSON.parse(localStorage.getItem('db_sipan')) || [];
            
            if(data.length === 0) {
                list.innerHTML = `<p class="py-10 text-gray-300 italic text-xs">Belum ada laporan.</p>`;
                return;
            }

            list.innerHTML = data.reverse().map(d => `
                <div class="bg-white p-5 rounded-3xl shadow-sm border-l-8 border-orange-500 text-left">
                    <div class="flex justify-between text-[8px] font-bold text-gray-400 mb-1">
                        <span>LAPORAN PROYEK</span><span>${d.tgl}</span>
                    </div>
                    <h4 class="font-bold text-blue-900 text-xs uppercase">${d.judul}</h4>
                    <p class="text-[10px] text-gray-500 mb-3">${d.ket}</p>
                    <div class="bg-gray-100 h-1.5 rounded-full overflow-hidden">
                        <div class="bg-green-500 h-full" style="width: ${d.persen}%"></div>
                    </div>
                    <div class="flex justify-between items-center mt-4">
                        <span class="text-[9px] text-blue-700 italic"><i class="fas fa-paperclip"></i> ${d.file}</span>
                        <button onclick="window.open('${d.file}', '_blank')" class="bg-blue-900 text-white text-[9px] px-3 py-2 rounded-lg font-bold">BUKA DOKUMEN</button>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
