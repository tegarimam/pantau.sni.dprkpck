<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPANTAU CIPTAKARYA - DPRKPCK JATIM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        .animate-fadeIn { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #listSNI::-webkit-scrollbar { width: 4px; }
        #listSNI::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900 flex flex-col min-h-screen">

    <nav class="bg-blue-900 text-white shadow-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-white p-1 rounded-xl shadow-inner">
                    <img src="logo.png" alt="Logo" class="h-12 w-12 object-contain" onerror="this.src='https://via.placeholder.com/50?text=LOGO'">
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-tighter leading-none uppercase italic text-white">SIPANTAU CIPTAKARYA</h1>
                    <p class="text-xs tracking-[0.3em] font-bold text-yellow-400 uppercase mt-1">DPRKPCK Jatim</p>
                </div>
            </div>
            
            <div class="flex gap-8">
                <button onclick="switchMenu('input')" class="text-xs font-black uppercase tracking-widest hover:text-yellow-400 transition-colors">Input Data</button>
                <button onclick="switchMenu('monitor')" class="text-xs font-black uppercase tracking-widest hover:text-yellow-400 transition-colors">Monitoring</button>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto p-6 w-full">
        
        <div id="section-input" class="animate-fadeIn">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <div class="bg-white p-6 rounded-[2rem] border shadow-sm h-fit">
                    <div class="flex items-center gap-2 mb-4 border-b pb-3">
                        <h3 class="font-black text-blue-900 uppercase italic text-sm">📂 Database 10 SNI Utama</h3>
                    </div>
                    <div id="listSNI" class="space-y-3 max-h-[500px] overflow-y-auto pr-2">
                        </div>
                </div>

                <div class="lg:col-span-2 space-y-6">
                    <div class="bg-white p-8 rounded-[2rem] border shadow-sm border-t-[10px] border-blue-900">
                        <h3 class="font-black text-blue-900 mb-6 uppercase italic">📤 Arsip Dokumen Proyek</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <input type="text" id="namaArsip" placeholder="Nama Proyek Gedung" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 ring-blue-500 font-bold">
                            <input type="file" id="fileArsip" class="w-full p-3 bg-gray-50 border rounded-2xl text-xs font-bold">
                        </div>
                        <button onclick="simpanData('SNI')" class="w-full mt-6 bg-blue-900 text-white font-black py-4 rounded-2xl hover:bg-blue-800 uppercase tracking-widest shadow-lg">Simpan Ke Database</button>
                    </div>

                    <div class="bg-white p-8 rounded-[2rem] border shadow-sm border-t-[10px] border-green-600">
                        <h3 class="font-black text-green-700 mb-6 uppercase italic">🏗️ Progres Lapangan</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <input type="text" id="namaPaket" placeholder="Nama Paket Pekerjaan" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 ring-green-500 font-bold">
                            <input type="number" id="persenFisik" placeholder="Progres (%)" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 ring-green-500 font-bold">
                        </div>
                        <button onclick="simpanData('LAP')" class="w-full mt-6 bg-green-700 text-white font-black py-4 rounded-2xl hover:bg-green-600 uppercase tracking-widest shadow-lg">Update Monitoring</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="section-monitor" class="hidden animate-fadeIn">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black text-blue-900 uppercase italic">Dashboard Realtime</h2>
                <button onclick="resetData()" class="bg-red-50 text-red-600 text-[10px] font-black px-6 py-3 rounded-full border border-red-100 hover:bg-red-600 hover:text-white uppercase transition-all">Reset Data</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-white rounded-[2.5rem] shadow-xl border overflow-hidden">
                    <div class="bg-blue-900 p-5 text-white font-black text-xs uppercase italic">Arsip Terverifikasi</div>
                    <div id="displayArsip" class="p-6 space-y-4 min-h-[400px]"></div>
                </div>

                <div class="bg-white rounded-[2.5rem] shadow-xl border overflow-hidden">
                    <div class="bg-green-700 p-5 text-white font-black text-xs uppercase italic">Capaian Lapangan</div>
                    <div id="displayProgres" class="p-6 space-y-4 min-h-[400px]"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Masukkan link file GitHub Anda di sini
        const databaseSNI = [
            { no: "2847:2019", judul: "Beton Struktural", url: "MASUKKAN_LINK_GITHUB_DI_SINI" },
            { no: "1726:2019", judul: "Ketahanan Gempa", url: "#" },
            { no: "1727:2020", judul: "Beban Desain", url: "#" },
            { no: "1729:2020", judul: "Bangunan Baja", url: "#" },
            { no: "8460:2017", judul: "Geoteknik", url: "#" },
            { no: "2052:2017", judul: "Baja Tulangan", url: "#" },
            { no: "1734:2015", judul: "Beton Bertulang", url: "#" },
            { no: "7971:2013", judul: "Struktur Kayu", url: "#" },
            { no: "8151:2015", judul: "Panel Beton", url: "#" },
            { no: "1735:2015", judul: "Proteksi Api", url: "#" }
        ];

        function renderSNI() {
            const container = document.getElementById('listSNI');
            container.innerHTML = databaseSNI.map(item => `
                <a href="${item.url}" target="_blank" class="block p-4 bg-gray-50 border rounded-2xl hover:bg-blue-900 hover:text-white transition-all group border-l-[6px] border-l-blue-900">
                    <div class="text-[11px] font-black uppercase">SNI ${item.no}</div>
                    <div class="text-[9px] font-bold opacity-60 uppercase mt-1">${item.judul}</div>
                </a>
            `).join('');
        }

        function simpanData(tipe) {
            let dataLama = JSON.parse(localStorage.getItem('db_sipantau_final')) || [];
            let entry = { id: Date.now(), waktu: new Date().toLocaleString() };

            if(tipe === 'SNI') {
                const nama = document.getElementById('namaArsip').value;
                const file = document.getElementById('fileArsip').files[0];
                if(!nama || !file) return alert("Isi data dengan lengkap!");
                entry = { ...entry, tipe: 'SNI', nama: nama, info: file.name };
            } else {
                const paket = document.getElementById('namaPaket').value;
                const persen = document.getElementById('persenFisik').value;
                if(!paket || !persen) return alert("Isi progres lapangan!");
                entry = { ...entry, tipe: 'LAP', nama: paket, info: persen + "%" };
            }

            dataLama.unshift(entry);
            localStorage.setItem('db_sipantau_final', JSON.stringify(dataLama));
            alert("Data Berhasil Tersimpan Permanen!");
            refreshUI();
            switchMenu('monitor');
        }

        function refreshUI() {
            const data = JSON.parse(localStorage.getItem('db_sipantau_final')) || [];
            const containerA = document.getElementById('displayArsip');
            const containerP = document.getElementById('displayProgres');
            containerA.innerHTML = ''; containerP.innerHTML = '';

            data.forEach(item => {
                const card = `
                    <div class="p-5 bg-gray-50 border rounded-3xl flex justify-between items-center shadow-sm border-l-[6px] ${item.tipe === 'SNI' ? 'border-l-blue-900' : 'border-l-green-600'}">
                        <div>
                            <p class="font-black text-blue-900 text-sm uppercase">${item.nama}</p>
                            <p class="text-[10px] text-gray-400 font-bold mt-1">${item.waktu}</p>
                        </div>
                        <div class="font-black ${item.tipe === 'SNI' ? 'text-blue-700' : 'text-green-700'} text-xs">${item.info}</div>
                    </div>
                `;
                if(item.tipe === 'SNI') containerA.innerHTML += card;
                else containerP.innerHTML += card;
            });
        }

        function switchMenu(m) {
            document.getElementById('section-input').classList.toggle('hidden', m !== 'input');
            document.getElementById('section-monitor').classList.toggle('hidden', m !== 'monitor');
        }

        function resetData() {
            if(confirm("Hapus semua riwayat?")) {
                localStorage.removeItem('db_sipantau_final');
                refreshUI();
            }
        }

        window.onload = () => { renderSNI(); refreshUI(); };
    </script>
</body>
</html>
